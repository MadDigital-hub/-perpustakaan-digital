<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    margin:0;
}

header{
    background:#111827;
    color:white;
    text-align:center;
    padding:70px 20px;
}
    
header h1{
   margin:0;
   font-size:42px;
}

header p{
   margin-top:15px;
    opacity:0.8;

}
.section-title{
    font-size:28px;
    font-weight:bold;
    margin:30px 20px;
    color:#111827;
}
.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    transition:0.3s;
}
    
.card:hover{
    transform:translateY(-5px);
}
                               
        
.card img{
    width:100%;
    height:500px;
    object-fit:cover;
}

.card h3{
    padding:18px;
    margin:0;
    front-size:22px;
    line-height:1.4;
} 

.btn{
    display:block;
    text-align:center;
    padding:16px;
    text-decoration:none;
    background:#111827;
    color:white;
    font-weight:bold;
    transition:0.3s;
}
    .btn:hover{
     background:#000;
}
</style>
</head>
